# Production-like local runtime: Nginx serves the static Next export and keeps
# every /api request on the same origin by forwarding it to Fastify.
# The certificate files are intentionally local-only and ignored by Git.

server {
    listen 80;
    listen [::]:80;
    server_name lovart.local.dofe.ai;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name lovart.local.dofe.ai;

    ssl_certificate     /Users/techwu/Documents/codes/dofe.ai/lovart.dofe.ai/nginx/certs/lovart.local.dofe.ai.pem;
    ssl_certificate_key /Users/techwu/Documents/codes/dofe.ai/lovart.dofe.ai/nginx/certs/lovart.local.dofe.ai-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 50m;
    root /Users/techwu/Documents/codes/dofe.ai/lovart.dofe.ai/apps/web/out;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https: wss:" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Legacy identity URLs must never reach the static Next export. Fastify
    # validates the fixed returnTo value before it starts the PKCE flow.
    location = /login {
        return 302 /api/auth/oidc/start?returnTo=%2Fhome;
    }

    location = /register {
        return 302 /api/auth/oidc/start?returnTo=%2Fhome;
    }

    # WebSocket is a distinct upgrade request and must not be buffered.
    location = /api/ws {
        proxy_pass http://127.0.0.1:3105;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Keep /api in the upstream request. Fastify owns routes such as /api/health.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3105;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
