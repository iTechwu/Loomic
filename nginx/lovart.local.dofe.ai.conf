# Install this file into the local Nginx servers directory after building the web app.
# The certificate files are intentionally local-only and ignored by Git.

server {
    listen 80;
    listen [::]:80;
    server_name lovart.local.dofe.ai;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name lovart.local.dofe.ai;

    ssl_certificate     /Users/techwu/Documents/codes/dofe.ai/lovart.dofe.ai/nginx/certs/lovart.local.dofe.ai.pem;
    ssl_certificate_key /Users/techwu/Documents/codes/dofe.ai/lovart.dofe.ai/nginx/certs/lovart.local.dofe.ai-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 50m;

    # `pnpm --filter @lovart.dofe/web build` writes the static Next.js export here.
    root /Users/techwu/Documents/codes/dofe.ai/lovart.dofe.ai/apps/web/out;
    index index.html;

    # WebSocket is a distinct upgrade request and must not be buffered.
    location = /api/ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Keep /api in the upstream request. Fastify owns routes such as /api/health.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
