services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    read_only: true
    restart: unless-stopped
    tmpfs:
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    env_file:
      - ${LOVART_ENV_FILE:-.env.production}
    environment:
      HOST: 0.0.0.0
      SERVICE_MODE: api
    expose:
      - "3105"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3105/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    command: ["sh", "-c", "exec node --import tsx src/worker.ts"]
    env_file:
      - ${LOVART_ENV_FILE:-.env.production}
    environment:
      SERVICE_MODE: worker
    restart: unless-stopped
